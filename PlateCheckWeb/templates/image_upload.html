<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PlateCheck AI</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
        <style>
            :root{
                --bg:#0B1120;
                --card:#111827;
                --accent:#22C55E;
                --text:#F8FAFC;
                --secondary:#94A3B8;
                --border:rgba(255,255,255,.08);
            }

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:'Poppins',sans-serif;
            }

            body{
                background:var(--bg);
                color:var(--text);
                min-height:100vh;
            }

            .container{
                max-width:1400px;
                margin:auto;
                padding:40px;
                padding-top:20px;
            }

            .header{
                text-align:center;
                margin-bottom:40px;
            }

            .header h1{
                font-size:3rem;
                margin-bottom:10px;
            }

            .header p{
                color:var(--secondary);
            }

            .upload-box{
                display:block;
                background:var(--card);
                border:2px dashed #334155;
                border-radius:25px;
                padding:60px;
                text-align:center;
                cursor:pointer;
                transition:.3s;
                margin-top:20px;
            }

            .upload-box:hover{
                border-color:var(--accent);
                transform:translateY(-4px);
            }

            .upload-box i{
                font-size:60px;
                display:block;
                margin-bottom:15px;
            }

            .upload-box h2{
                margin-bottom:10px;
            }

            .upload-box p{
                color:var(--secondary);
            }

            #imageInput{
                display:none;
            }

            .analysis-section{
                margin-top:40px;
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:25px;
            }

            .preview-card,
            .result-card{
                background:var(--card);
                border-radius:25px;
                padding:25px;
            }

            .preview-card h2,
            .result-card h2{
                margin-bottom:20px;
            }

            .preview-area{
                height:400px;
                display:flex;
                align-items:center;
                justify-content:center;
                border:1px solid var(--border);
                border-radius:20px;
                overflow:hidden;
            }

            .preview-area img{
                width:100%;
                height:100%;
                object-fit:cover;
            }

            .placeholder{
                color:var(--secondary);
            }

            .metrics{
                display:grid;
                grid-template-columns:repeat(2,1fr);
                gap:15px;
            }

            .metric{
                background:#1E293B;
                padding:20px;
                border-radius:18px;
                transition:.3s;
            }

            .metric:hover{
                transform:translateY(-5px);
            }

            .metric h3{
                font-size:14px;
                color:var(--secondary);
                margin-bottom:8px;
            }

            .metric span{
                font-size:24px;
                font-weight:700;
            }

            .insights{
                margin-top:30px;
                background:#1E293B;
                padding:25px;
                border-radius:20px;
            }

            .insights h3{
                margin-bottom:12px;
            }

            .insights p{
                line-height:1.7;
                color:#CBD5E1;
            }

            .analyze-btn{
                margin-top:25px;
                width:100%;
                padding:18px;
                border:none;
                border-radius:16px;
                font-size:17px;
                font-weight:600;
                cursor:pointer;
                background:var(--accent);
                color:#fff;
                transition:.3s;
            }

            .analyze-btn:hover{
                transform:translateY(-3px);
            }

            .analyze-btn.secondary{
                background:#1E293B;
                color:var(--text);
                border:1px solid var(--border);
            }

            .messages{
                list-style:none;
                margin-bottom:16px;
            }

            .messages li{
                padding:10px 14px;
                border-radius:8px;
                font-size:13px;
                margin-bottom:6px;
            }

            .messages .success{ background:#1a3b2a; color:#4ade80; }
            .messages .error{   background:#3b1a1a; color:#f87171; }
            .messages .info{    background:#1a2a3b; color:#60a5fa; }

            @media(max-width:900px){
                .analysis-section{ grid-template-columns:1fr; }
                .preview-area{ height:300px; }
                .header h1{ font-size:2rem; }
            }
        </style>
    </head>

    <body>
        <div class="container">

            <div class="header">
                <h1>🍽 PlateCheck AI</h1>
                <p>Upload food images and get instant nutrition analysis</p>
            </div>

            <form method="post" action="{% url 'image_upload' %}" enctype="multipart/form-data" id="uploadForm">
                {% csrf_token %}
                <label class="upload-box" for="imageInput">
                    <h2>Upload Food Image</h2>
                    <p>Drag & Drop or Click to Upload</p>
                </label>
                <input type="file" id="imageInput" name="food_image" accept="image/*">
            </form>

            <div class="analysis-section">
                <div class="preview-card">
                    <h2>Food Preview</h2>
                    <div class="preview-area" id="previewArea">
                        <div class="placeholder">No image selected</div>
                    </div>
                    <div class="insights">
                        <h3>AI Insights</h3>
                        <p id="insightText">Upload an image to receive nutritional insights.</p>
                    </div>
                </div>

                <div class="result-card">
                    <h2>Nutrition Analysis</h2>
                    <div class="metrics">
                        <div class="metric">
                            <h3>Calories</h3>
                            <span id="calories">0</span>
                        </div>
                        <div class="metric">
                            <h3>Protein</h3>
                            <span id="protein">0g</span>
                        </div>
                        <div class="metric">
                            <h3>Carbs</h3>
                            <span id="carbs">0g</span>
                        </div>
                        <div class="metric">
                            <h3>Fat</h3>
                            <span id="fat">0g</span>
                        </div>
                        <div class="metric">
                            <h3>Fiber</h3>
                            <span id="fiber">0g</span>
                        </div>
                        <div class="metric">
                            <h3>Sugar</h3>
                            <span id="sugar">0g</span>
                        </div>
                    </div>

                    <button class="analyze-btn" id="analyzeBtn">Analyze Food</button>
                    <button class="analyze-btn secondary" id="addMealBtn" onclick="addMealToDashboard()">Add Meal as Entry</button>
                    <button class="analyze-btn secondary" onclick="window.location.href='{% url 'dashboard' %}'">Back to Dashboard</button>
                </div>
            </div>
        </div>

        <script>
            const imageInput = document.getElementById("imageInput");
            const previewArea = document.getElementById("previewArea");

            imageInput.addEventListener("change", function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewArea.innerHTML = `<img src="${e.target.result}">`;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // If Django returned analysis results, populate the cards
            {% if nutrition %}
                document.getElementById("calories").innerText  = "{{ nutrition.calories }}";
                document.getElementById("protein").innerText   = "{{ nutrition.protein }}g";
                document.getElementById("carbs").innerText     = "{{ nutrition.carbs }}g";
                document.getElementById("fat").innerText       = "{{ nutrition.fat }}g";
                document.getElementById("fiber").innerText     = "{{ nutrition.fiber }}g";
                document.getElementById("sugar").innerText     = "{{ nutrition.sugar }}g";
                document.getElementById("insightText").innerText = "{{ nutrition.insight }}";
            {% endif %}

            // Analyze button — submits image to Django + Gemini
            document.getElementById('analyzeBtn').addEventListener("click", () => {
                if (!imageInput.files[0]) {
                    alert("Please select an image first.");
                    return;
                }
                document.getElementById('uploadForm').submit();
            });

            // Add Meal button — POSTs nutrition stats to log_meal view
            function addMealToDashboard() {
                const calories = document.getElementById('calories').innerText.replace('g', '');
                const protein  = document.getElementById('protein').innerText.replace('g', '');
                const carbs    = document.getElementById('carbs').innerText.replace('g', '');
                const fat      = document.getElementById('fat').innerText.replace('g', '');
                const fiber    = document.getElementById('fiber').innerText.replace('g', '');

                if (calories === '0') {
                    alert("Please analyze an image first before adding it as a meal entry.");
                    return;
                }

                const form = document.createElement('form');
                form.method = 'POST';
                form.action = "{% url 'log_meal' %}";

                const fields = {
                    csrfmiddlewaretoken: "{{ csrf_token }}",
                    meal_name: "Uploaded Meal",
                    calories:  calories,
                    protein:   protein,
                    carbs:     carbs,
                    fats:      fat,
                    fiber:     fiber,
                };

                for (const [key, value] of Object.entries(fields)) {
                    const input = document.createElement('input');
                    input.type  = 'hidden';
                    input.name  = key;
                    input.value = value;
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                form.submit();
            }
        </script>
    </body>
</html>
